services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=tododb
      - DB_USER=admin
      - DB_PASSWORD=secret123
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:14
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tododb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data: